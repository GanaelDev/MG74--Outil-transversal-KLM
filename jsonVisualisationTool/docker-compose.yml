services:
  viz:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mg74-viz
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./:/app                # code monté pour le hot-reload
      - /app/node_modules      # volume anonyme : préserve les deps installées dans l'image
    environment:
      CHOKIDAR_USEPOLLING: "true"   # détection fiable des changements via bind mount (macOS/Windows)
